<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connector Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SPLASH -->

<div id="splash">

<h1>CONNECTOR GENERATOR</h1>

<h2>VELOCÍMETROS DIGITALES CDMX</h2>

<div class="loading-box">
<div id="loading-bar"></div>
</div>

<p id="status">
Iniciando Sistema...
</p>

</div>

<!-- MENU PRINCIPAL -->

<div id="menu">

<h1 class="titulo">
CONNECTOR GENERATOR
</h1>

<button onclick="document.getElementById('foto').click()">
📷 ESCANEAR CONECTOR
</button>

<button>
➕ NUEVO CONECTOR
</button>

<button>
📚 BASE DE DATOS
</button>

<button>
📄 EXPORTAR PDF
</button>

<button>
⚙ CONFIGURACIÓN
</button>

<input
id="foto"
type="file"
accept="image/*"
capture="environment"
style="display:none"
onchange="mostrarFoto(event)">

<div id="preview-container">

<img id="preview">

</div>

<button id="btnPinout" onclick="generarPinout()">
⚡ GENERAR PINOUT
</button>

<div id="pinout"></div>

</div>

<script src="script.js"></script>

</body>
</html>
