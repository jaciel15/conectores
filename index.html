<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connector Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SPLASH -->

<div id="splash">

<h1>CONNECTOR GENERATOR</h1>

<h2>VELOCÍMETROS DIGITALES CDMX</h2>

<div class="loading-box">
<div id="loading-bar"></div>
</div>

<p id="status">
Iniciando Sistema...
</p>

</div>

<!-- MENU PRINCIPAL -->

<div id="menu">

<h1 class="titulo">
CONNECTOR GENERATOR
</h1>

<button onclick="document.getElementById('foto').click()">
📷 ESCANEAR CONECTOR
</button>

<button onclick="abrirNuevoConector()">
➕ NUEVO CONECTOR
</button>

<a href="database.html">
<button>
📁 BASE DE DATOS
</button>
</a>

<button>
📄 EXPORTAR PDF
</button>

<button>
⚙ CONFIGURACIÓN
</button>

<input
id="foto"
type="file"
accept="image/*"
capture="environment"
style="display:none"
onchange="mostrarFoto(event)">

<div id="preview-container">

<img id="preview">

</div>

<button id="btnPinout" onclick="generarPinout()">
⚡ GENERAR PINOUT
</button>

<div id="pinout"></div>
<!-- NUEVO CONECTOR -->

<div id="nuevoConector" style="display:none;">

<h2>NUEVO CONECTOR</h2>

<label>Tipo</label>

<select id="tipo">
<option value="">Seleccionar</option>
<option>MOTO</option>
<option>AUTO</option>
</select>

<label>Marca</label>

<input
type="text"
id="marca"
placeholder="YAMAHA">

<label>Modelo</label>

<input
type="text"
id="modelo"
placeholder="MT03">

<label>Versión</label>

<input
type="text"
id="version"
value="V1">

<h3>Foto Cluster</h3>

<input
type="file"
accept="image/*"
capture="environment">

<h3>Foto Conector</h3>

<input
type="file"
accept="image/*"
capture="environment">

<button onclick="guardarConector()">
💾 GUARDAR
</button>

<button onclick="siguientePaso()">
➡ SIGUIENTE
</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
